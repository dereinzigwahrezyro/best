/* ── DISCORD STATUS ── */
(async function fetchStatus() {
  try {
    const res  = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discord.id}`);
    const data = await res.json();
    if (!data.success) return;
    const s = data.data.discord_status;
    const labels = {online:'Online',idle:'Idle',dnd:'Bitte nicht stören',offline:'Offline'};
    let label = labels[s]||s;
    const act = data.data.activities?.find(a=>a.type===0);
    if (act) label = `Playing ${act.name}`;
    const dot  = document.getElementById('status-dot');
    const icon = document.getElementById('status-icon');
    const txt  = document.getElementById('status-text');
    const tag  = document.getElementById('status-tag');
    if(dot)  dot.className  = 'status-dot '+s;
    if(icon) icon.className = 'dc-status-icon '+s;
    if(txt)  txt.textContent = label;
    if(tag)  tag.textContent = labels[s]||s;
  } catch{}
  setTimeout(fetchStatus, 30000);
})();


/* ── PARTICLES ── */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W,H;
  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  const pts = Array.from({length:250},()=>{
    const y=Math.random()<0.14;
    return{x:rand(0,innerWidth),y:rand(0,innerHeight),r:rand(0.3,y?2:1.2),a:rand(0.06,y?0.7:0.32),vx:rand(-0.12,0.12),vy:rand(-0.22,-0.04),ts:rand(0.004,0.022),td:1,c:y?[240,168,24]:[255,255,255]};
  });
  function frame(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.a+=p.ts*p.td; if(p.a>0.75||p.a<0.04)p.td*=-1;
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-4){p.y=H+4;p.x=rand(0,W);}
      if(p.x<-4)p.x=W+4; if(p.x>W+4)p.x=-4;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.a})`; ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();


/* ── AUDIO PLAYER ── */
(function(){
  const audio = new Audio();
  const art   = document.getElementById('player-art');
  const img   = document.getElementById('player-img');
  const ph    = document.getElementById('player-art-ph');
  const titleEl  = document.getElementById('player-title');
  const artistEl = document.getElementById('player-artist');
  const prog  = document.getElementById('prog');
  const tCur  = document.getElementById('t-cur');
  const tDur  = document.getElementById('t-dur');
  const vol   = document.getElementById('vol');
  const btnPlay = document.getElementById('btn-play');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  const SVG_PLAY  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const SVG_PAUSE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

  let cur=0, playing=false;

  function fmt(s){ if(!s||isNaN(s)||!isFinite(s))return'0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

  function syncIcon(){ btnPlay.innerHTML = playing ? SVG_PAUSE : SVG_PLAY; }

  function loadTrack(idx, andPlay){
    const t=PLAYLIST[idx]; if(!t)return;
    titleEl.textContent=t.title; artistEl.textContent=t.artist;
    if(t.cover){ img.src=t.cover; img.style.display='block'; ph.style.display='none'; }
    else { img.style.display='none'; ph.style.display='flex'; }
    if(t.src){ audio.src=t.src; audio.load(); }
    prog.value=0; prog.style.background='rgba(255,255,255,0.15)';
    tCur.textContent='0:00'; tDur.textContent='0:00';
    if(andPlay){ audio.play().then(()=>{ playing=true; syncIcon(); art.classList.add('spinning'); }).catch(()=>{}); }
    else { playing=false; syncIcon(); art.classList.remove('spinning'); }
  }

  btnPlay.addEventListener('click',()=>{
    if(!PLAYLIST[cur]?.src)return;
    if(playing){ audio.pause(); playing=false; syncIcon(); art.classList.remove('spinning'); }
    else{ audio.play().then(()=>{ playing=true; syncIcon(); art.classList.add('spinning'); }).catch(()=>{}); }
  });
  btnNext.addEventListener('click',()=>{ cur=(cur+1)%PLAYLIST.length; loadTrack(cur,playing); });
  btnPrev.addEventListener('click',()=>{
    if(audio.currentTime>3){audio.currentTime=0;return;}
    cur=(cur-1+PLAYLIST.length)%PLAYLIST.length; loadTrack(cur,playing);
  });
  audio.addEventListener('timeupdate',()=>{
    if(!audio.duration)return;
    const p=(audio.currentTime/audio.duration)*100;
    prog.value=p; prog.style.background=`linear-gradient(to right,var(--accent) ${p}%,rgba(255,255,255,0.15) ${p}%)`;
    tCur.textContent=fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata',()=>{ tDur.textContent=fmt(audio.duration); });
  audio.addEventListener('ended',()=>{ cur=(cur+1)%PLAYLIST.length; loadTrack(cur,true); });
  prog.addEventListener('input',()=>{ if(audio.duration)audio.currentTime=(prog.value/100)*audio.duration; });
  vol.addEventListener('input',()=>{
    audio.volume=parseFloat(vol.value);
    const p=vol.value*100;
    vol.style.background=`linear-gradient(to right,rgba(255,255,255,0.5) ${p}%,rgba(255,255,255,0.15) ${p}%)`;
  });
  audio.volume=parseFloat(vol.value);
  vol.style.background=`linear-gradient(to right,rgba(255,255,255,0.5) 70%,rgba(255,255,255,0.15) 70%)`;

  window._playerPlay = ()=>{ loadTrack(cur,true); };
  loadTrack(0, false);
})();


/* ── GATE ── */
document.getElementById('gate').addEventListener('click', function(){
  this.style.transition='opacity 0.4s ease';
  this.style.opacity='0';
  setTimeout(()=>{ this.style.display='none'; }, 400);

  const wrapper = document.querySelector('.wrapper');
  wrapper.style.opacity='1';
  const kids = Array.from(wrapper.children);
  kids.forEach(c=>{ c.style.opacity='0'; c.style.transform='translateY(12px)'; });
  kids.forEach((c,i)=>{
    setTimeout(()=>{
      c.style.transition='opacity 0.35s ease,transform 0.35s ease';
      c.style.opacity='1'; c.style.transform='translateY(0)';
    }, i*70);
  });

  setTimeout(()=>{ if(window._playerPlay)window._playerPlay(); }, 350);
});
</script>
