    /* ================================================================

    :root {
      --accent: #f0a818;
      --accent-dim: rgba(240,168,24,0.13);
      --accent-glow: rgba(240,168,24,0.32);
      --accent-glow-strong: rgba(240,168,24,0.65);
      --bg: #090909;
      --surface: #111111;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8e8;
      --muted: #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      overflow-x: hidden;
    }

    /* ── CLICK-TO-ENTER GATE ── */
    #gate {
      position: fixed;
      inset: 0;
      background: #090909;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    #gate.hide {
      opacity: 0;
      pointer-events: none;
    }

    #gate-logo {
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      font-weight: 900;
      letter-spacing: -0.045em;
      color: #fff;
      user-select: none;
      animation: introScale 1.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    #gate-logo .tld {
      color: var(--accent);
      text-shadow:
        0 0 20px rgba(240,168,24,0.65),
        0 0 60px rgba(240,168,24,0.32),
        0 0 120px rgba(240,168,24,0.15);
      animation: glowPulse 3s ease-in-out infinite;
    }

    #gate-hint {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: hintPulse 2s ease-in-out infinite;
      user-select: none;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* intro hidden by default, shown after gate click */
    #intro { display: none; }
    #intro.active { display: flex; }

    /* ── PARTICLE CANVAS ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── INTRO SPLASH ── */
    #intro {
      position: fixed;
      inset: 0;
      background: #090909;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      animation: introFade 0.55s ease 1.3s both;
    }

    .intro-logo {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.045em;
      color: #fff;
      animation: introScale 1.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    .intro-logo .tld {
      color: var(--accent);
      text-shadow:
        0 0 20px rgba(240,168,24,0.65),
        0 0 60px rgba(240,168,24,0.32),
        0 0 120px rgba(240,168,24,0.15);
    }

    @keyframes introScale {
      0%   { opacity: 0; transform: scale(0.82) translateY(10px); }
      60%  { opacity: 1; transform: scale(1.04) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes introFade {
      0%   { opacity: 1; pointer-events: all; }
      100% { opacity: 0; pointer-events: none; }
    }

    /* ── MAIN WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger applied dynamically via JS after gate click */
    .wrapper > * { opacity: 0; }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SITE TITLE ── */
    .site-title {
      font-size: clamp(3.2rem, 11vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.045em;
      color: #fff;
      text-align: center;
      line-height: 1;
      margin-bottom: 22px;
      user-select: none;

    .site-title .tld {

        0 0 100px rgba(240,168,24,0.12);

    @keyframes glowPulse {

        text-shadow:
          0 0 16px rgba(240,168,24,0.65),
          0 0 45px rgba(240,168,24,0.32),
          0 0 90px rgba(240,168,24,0.1);
      }
      50% {

          0 0 30px rgba(240,168,24,0.75),
          0 0 70px rgba(240,168,24,0.38),
          0 0 140px rgba(240,168,24,0.2);
      }

    /* ── SECTION LABEL ── */
    .section-label {

      align-items: center;
      gap: 7px;
      font-size: 0.6rem;

    /* ── SERVER LINKS ── */
    .server-list { display: flex; flex-direction: column; gap: 6px; }

    .server-link {

      align-items: center;
      gap: 12px;

      transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;

    .server-link::before {
      content: '';

      inset: 0;
      background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 70%);
      opacity: 0;

    .server-link:hover {
      background: rgba(255,255,255,0.055);
      border-color: rgba(255,255,255,0.13);

    .server-link.featured {

    .server-link.featured:hover {

    .server-right {

    .featured-badge {
      font-size: 0.54rem; font-weight: 700;

      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.2s;

    .social-link:hover {
      background: rgba(255,255,255,0.055);

    .social-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,0.05);

      font-size: 1.05rem;
      flex-shrink: 0; position: relative; z-index: 1;

    .social-icon svg { display: block; flex-shrink: 0; }

    .social-info {

    .social-handle { font-size: 0.88rem; font-weight: 600; color: #fff; }
    .social-platform { font-size: 0.67rem; color: var(--muted); }

    .discord-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
      text-decoration: none;

    .discord-card:hover {
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    /* banner */
    .dc-banner {
      height: 72px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #1a0a1a 70%, #2a0a0a 100%);
      position: relative;
      overflow: hidden;
    }
    .dc-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(

        rgba(255,255,255,0.012) 0px,
        rgba(255,255,255,0.012) 1px,
        transparent 1px,
        transparent 18px

    }

    /* avatar sits half on banner, half on body */
    .dc-body {
      background: #161616;
      padding: 8px 16px 14px;
      position: relative;
    }

    .dc-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-top: -28px;
      margin-bottom: 8px;
    }

    .dc-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 4px solid #161616;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: #fff;
      overflow: hidden;
      position: relative;
    }

    .dc-avatar-letter {
      font-size: 1.4rem; font-weight: 800; color: rgba(255,255,255,0.85);
      font-family: 'Inter', sans-serif;
    }

    .status-dot {
      position: absolute; bottom: 3px; right: 3px;
      width: 13px; height: 13px; border-radius: 50%;
      border: 3px solid #161616; background: #747f8d;
      transition: background 0.3s;
    }
    .status-dot.online  { background: #3ba55d; }
    .status-dot.idle    { background: #faa81a; }
    .status-dot.dnd     { background: #ed4245; }
    .status-dot.offline { background: #747f8d; }

    .dc-name {
      font-size: 0.95rem; font-weight: 700; color: #fff;
      margin-bottom: 1px;
    }
    .dc-tag {
      font-size: 0.7rem; color: var(--muted);
      margin-bottom: 10px;
    }

    /* status bar */
    .dc-status-bar {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
    }
    .dc-status-icon {
      width: 9px; height: 9px; border-radius: 50%;
      background: #747f8d; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dc-status-icon.online  { background: #3ba55d; }
    .dc-status-icon.idle    { background: #faa81a; }
    .dc-status-icon.dnd     { background: #ed4245; }
    .dc-status-icon.offline { background: #747f8d; }
    .dc-status-label {
      font-size: 0.8rem; color: var(--muted);
    }

    /* footer row */
    .dc-footer-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .dc-discord-link {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7rem; font-weight: 600; color: #5865f2;
      text-decoration: none;
    }
    .dc-discord-link:hover { text-decoration: underline; }
    .dc-profile-link {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.7rem; color: var(--muted);
      text-decoration: none;
    }
    .dc-profile-link:hover { color: var(--text); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      font-size: 0.62rem; color: var(--muted);
      margin-top: 8px; letter-spacing: 0.06em;
    }
/* ── AUDIO PLAYER ── */
    #player {

      bottom: 20px;
      left: 20px;
      width: 300px;

    .player-top {

    .player-art {

      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
      position: relative;

    .player-art img {
      width: 100%; height: 100%;
      object-fit: cover;

    .player-art-placeholder {

    .player-meta { flex: 1; min-width: 0; }

    .player-title {

    .player-slider::-webkit-slider-thumb {

      transition: transform 0.15s;

      border: none; border-radius: 50%;
      background: #fff; cursor: pointer;

    .player-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 3px;

      display: flex;

      border-radius: 50%;

    .player-btn.play-btn:hover { transform: scale(1.1); background: #f0f0f0; }

    /* volume */
    .player-volume-row {
      display: flex;
      align-items: center;
      gap: 7px;

    .vol-icon { color: var(--muted); flex-shrink: 0; }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;

      background: #fff;

    .vol-slider::-moz-range-thumb {
      width: 11px; height: 11px;
      border: none; border-radius: 50%;
      background: #fff; cursor: pointer;

    /* spinning art when playing */
    @keyframes spinArt {
      from { transform: rotate(0deg); }

    .player-art.spinning img,
    .player-art.spinning .player-art-placeholder {
      animation: spinArt 8s linear infinite;
      border-radius: 50%;
    }
    .player-art.spinning { border-radius: 50%; }
  </style>

/* ── Gate: Click to enter ── */
document.getElementById('gate').addEventListener('click', function() {
  this.classList.add('hide');

  // Show wrapper immediately, stagger children in
  const wrapper = document.querySelector('.wrapper');
  wrapper.style.opacity = '1';
  Array.from(wrapper.children).forEach((child, i) => {
    child.style.opacity = '0';
    child.style.animation = `itemIn 0.35s ease ${i * 0.07}s both`;
  });

  // Autoplay first track
  setTimeout(() => {
    if (window._playerPlay) window._playerPlay();
  }, 300);
});

/* ─── Live Discord Status (Lanyard API) ─── */
async function fetchStatus() {
  try {
    const res  = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discord.id}`);
    const data = await res.json();
    if (!data.success) return;
    const s = data.data.discord_status;
    const labels = { online:'Online', idle:'Idle', dnd:'Bitte nicht stören', offline:'Offline' };
    let label = labels[s] || s;
    const act = data.data.activities?.find(a => a.type === 0);
    if (act) label = `Playing ${act.name}`;

    const dot  = document.getElementById('status-dot');
    const icon = document.getElementById('status-icon');
    const txt  = document.getElementById('status-text');
    const tag  = document.getElementById('status-tag');

    if (dot)  { dot.className  = 'status-dot ' + s; }
    if (icon) { icon.className = 'dc-status-icon ' + s; }
    if (txt)  { txt.textContent = label; }
    if (tag)  { tag.textContent = labels[s] || s; }
  } catch {
    const txt = document.getElementById('status-text');
    if (txt) txt.textContent = 'Status unavailable';
  }
}
fetchStatus();
setInterval(fetchStatus, 30000);


/* ─── Particles ─── */
(function () {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  const particles = Array.from({ length: 250 }, () => {
    const yellow = Math.random() < 0.14;
    return {
      x: rand(0, innerWidth),
      y: rand(0, innerHeight),
      r: rand(0.3, yellow ? 2.0 : 1.2),
      alpha: rand(0.06, yellow ? 0.7 : 0.32),
      vx: rand(-0.12, 0.12),
      vy: rand(-0.22, -0.04),
      ts: rand(0.004, 0.022),
      td: 1,
      color: yellow ? [240, 168, 24] : [255, 255, 255],
    };
  });

  function frame() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.alpha += p.ts * p.td;
      if (p.alpha > 0.75 || p.alpha < 0.04) p.td *= -1;
      p.x += p.vx; p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
      if (p.x < -4) p.x = W + 4;
      if (p.x > W + 4) p.x = -4;
      const [r, g, b] = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

<script>
/* ================================================================
   AUDIO PLAYER CONFIG
   Lege deine Dateien im GLEICHEN Ordner wie die index.html ab.
   Dann einfach nur den Dateinamen angeben:

   src:   "music1.mp3"   → liegt neben index.html
   cover: "pfp1.png"     → liegt neben index.html

   Volle URLs gehen auch:
   src:   "https://example.com/song.mp3"
================================================================ */
const PLAYLIST = [
  {
    title: "sss",
    artist: "Ken Carson",
    src: "music1.mp3",        // ← Datei neben index.html ablegen
    cover: "pfp1.jpg"         // ← Coverbild neben index.html ablegen
  },
  {
    title: "Song 2",
    artist: "Artist 2",
    src: "music2.mp3",
    cover: "pfp2.png"
  },
];
/* ── Ende Player Config ── */

(function () {
  const audio       = new Audio();
  const art         = document.getElementById('player-art');
  const artImg      = document.getElementById('player-img');
  const artPh       = document.getElementById('player-art-placeholder');
  const titleEl     = document.getElementById('player-title');
  const artistEl    = document.getElementById('player-artist');
  const progressEl  = document.getElementById('progress-slider');
  const timeCur     = document.getElementById('time-cur');
  const timeDur     = document.getElementById('time-dur');
  const volSlider   = document.getElementById('vol-slider');
  const btnPlay     = document.getElementById('btn-play');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const playIcon    = document.getElementById('play-icon');

  let current = 0;
  let isPlaying = false;

  const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  const PLAY_PATH  = 'M8 5v14l11-7z';

  function fmt(s) {
    if (isNaN(s) || !isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function loadTrack(idx) {
    const t = PLAYLIST[idx];
    if (!t) return;
    titleEl.textContent  = t.title;
    artistEl.textContent = t.artist;

    if (t.cover) {
      artImg.src = t.cover;
      artImg.style.display = 'block';
      artImg.style.position = 'absolute';
      artImg.style.inset = '0';
      artPh.style.display = 'none';
    } else {
      artImg.style.display = 'none';
      artPh.style.display  = 'flex';
    }

    if (t.src) {
      audio.src = t.src;
      audio.load();
    }
    progressEl.value = 0;
    timeCur.textContent = '0:00';
    timeDur.textContent = '0:00';
  }

  const playIconPath = playIcon.querySelector('path') || playIcon;

  function setPlaying(val) {
    isPlaying = val;
    playIconPath.setAttribute('d', val ? PAUSE_PATH : PLAY_PATH);
    if (val) {
      art.classList.add('spinning');
    } else {
      art.classList.remove('spinning');
    }
  }

  btnPlay.addEventListener('click', () => {
    if (!PLAYLIST[current].src) return;
    if (isPlaying) { audio.pause(); setPlaying(false); }
    else           { audio.play().catch(()=>{}); setPlaying(true); }
  });

  btnNext.addEventListener('click', () => {
    current = (current + 1) % PLAYLIST.length;
    loadTrack(current);
    if (isPlaying) audio.play().catch(()=>{});
  });

  btnPrev.addEventListener('click', () => {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    current = (current - 1 + PLAYLIST.length) % PLAYLIST.length;
    loadTrack(current);
    if (isPlaying) audio.play().catch(()=>{});
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressEl.value = pct;
    progressEl.style.background = `linear-gradient(to right, var(--accent) ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
    timeCur.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => {
    current = (current + 1) % PLAYLIST.length;
    loadTrack(current);
    audio.play().catch(()=>{});
  });

  progressEl.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (progressEl.value / 100) * audio.duration;
  });

  volSlider.addEventListener('input', () => {
    audio.volume = volSlider.value;
    const pct = volSlider.value * 100;
    volSlider.style.background = `linear-gradient(to right, rgba(255,255,255,0.5) ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
  });

  audio.volume = parseFloat(volSlider.value);

  // expose play fn for gate
  window._playerPlay = () => {
    if (PLAYLIST[current].src) {
      audio.play().catch(() => {});
      setPlaying(true);
    }
  };

  // init
  loadTrack(current);
})();
</script>
